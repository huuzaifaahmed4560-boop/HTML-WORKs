<!DOCTYPE html>
<html>
<head>
    <title>Key Press Event</title>
    <script>
        function showKey() {
            document.getElementById("msg").innerHTML = "Key Pressed!";
        }
    </script>
</head>
<body>

<h2>Scenario 3: onkeypress Event</h2>

<input type="text" onkeypress="showKey()" placeholder="Type something">

<p id="msg"></p>

</body>
</html>
