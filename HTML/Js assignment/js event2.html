<!DOCTYPE html>
<html>
<head>
    <title>Mouse Over Event</title>
    <script>
        function changeColor() {
            document.getElementById("box").style.backgroundColor = "yellow";
        }
    </script>
</head>
<body>

<h2>Scenario 2: onmouseover Event</h2>

<div id="box" onmouseover="changeColor()" 
     style="width:200px;height:100px;background-color:lightblue;">
    Hover over me
</div>

</body>
</html>
