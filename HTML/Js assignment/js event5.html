<!DOCTYPE html>
<html>
<head>
    <title>Double Click Event</title>
    <script>
        function changeText() {
            document.getElementById("text").innerHTML = "Text Changed!";
        }
    </script>
</head>
<body>

<h2>Scenario 5: ondblclick Event</h2>

<p id="text" ondblclick="changeText()">Double click this text</p>
